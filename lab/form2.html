<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="form2.css">
  </head>
  <body>
    <form class="card">
      <div class="card-header">
        <h1>Registration</h1>
        <p>Please complete all fields below.</p>
      </div>

      <div class="card-body">

        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Jane Doe">
        </div>

        <div class="field">
          <label for="postal">Postal Code</label>
          <input type="number" id="postal" placeholder="10001">
        </div>

        <div class="field">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" value="2026-06-25">
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="jane@example.com">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="field">
          <label for="country">Country</label>
          <select id="country">
            <option value="" disabled selected>Select a country...</option>
            <option value="us">Pakistan</option>
            <option value="uk">Afganistan</option>   
            <option value="bd">Bangladesh</option>
            <option value="ca">Turkey</option>
            <option value="au">Iraq</option>
            <option value="in">Iran</option>
          </select>
        </div>

        <div class="buttons">
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>
        </div>

      </div>
    </form>
  </body>
</html>
