<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create your account</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="form3.css">
  </head>
  <body>
    <form class="card">
      <div class="card-header">
        <h1>Create your account</h1>
        <p>Join us in a couple of steps.</p>
      </div>

      <div class="card-body">

        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Jane Doe">
        </div>

        <div class="field">
          <label for="age">Age</label>
          <input type="number" id="age" placeholder="28">
        </div>

        <div class="field">
          <label for="dob">Date of birth</label>
          <input type="date" id="dob" value="2026-06-25">
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="jane@example.com">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="field">
          <label>Preferred contact</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="contact" value="email" checked> Email
            </label>
            <label class="radio-option">
              <input type="radio" name="contact" value="phone"> Phone
            </label>
            <label class="radio-option">
              <input type="radio" name="contact" value="sms"> SMS
            </label>
          </div>
        </div>

        <div class="actions">
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>
        </div>

      </div>
    </form>
  </body>
</html>
